<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" role="img" aria-label="Altimetría de Sevilla Monumental y Triana">
    <title>Altimetría de Sevilla Monumental y Triana</title>
    <desc>Polilínea cerrada con escala horizontal en metros y escala vertical en metros.</desc>
    <rect x="0" y="0" width="1200" height="450" fill="#ffffff" />
    
    <line x1="120" y1="390" x2="1080" y2="390" stroke="#263238" stroke-width="2" />
    <line x1="120" y1="100" x2="120" y2="390" stroke="#263238" stroke-width="2" />
    
    <text x="600.0" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#263238">Distancia acumulada: 2000 m</text>
    <text x="35" y="225.0" transform="rotate(-90 35 225.0)" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#263238">Altitud: 9-14 m</text>
    
    <polyline points="120,390 120.00,216.00 240.00,100.00 408.00,274.00 720.00,390.00 1080.00,332.00 1080,390 120,390" fill="#dff1ed" stroke="#006d75" stroke-width="4" />
    <circle cx="120.00" cy="216.00" r="5" fill="#004f59" />
        <circle cx="240.00" cy="100.00" r="5" fill="#004f59" />
        <circle cx="408.00" cy="274.00" r="5" fill="#004f59" />
        <circle cx="720.00" cy="390.00" r="5" fill="#004f59" />
        <circle cx="1080.00" cy="332.00" r="5" fill="#004f59" />
    <g font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1f2933">
        <text x="128.00" y="201.00" text-anchor="start">Real Alcázar de Sevilla</text>
        <text x="240.00" y="65.00" text-anchor="middle">Hospital de los Venerables</text>
        <text x="408.00" y="259.00" text-anchor="middle">Catedral de Sevilla</text>
        <text x="720.00" y="355.00" text-anchor="middle">Palacio de San Telmo</text>
        <text x="1072.00" y="317.00" text-anchor="end">Real Parroquia de Señora Santa Ana</text>
    </g>
</svg>
