<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" role="img" aria-label="Altimetría de Guadalquivir y Parque de María Luisa">
    <title>Altimetría de Guadalquivir y Parque de María Luisa</title>
    <desc>Polilínea cerrada con escala horizontal en metros y escala vertical en metros.</desc>
    <rect x="0" y="0" width="1200" height="450" fill="#ffffff" />
    
    <line x1="120" y1="390" x2="1080" y2="390" stroke="#263238" stroke-width="2" />
    <line x1="120" y1="100" x2="120" y2="390" stroke="#263238" stroke-width="2" />
    
    <text x="600.0" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#263238">Distancia acumulada: 2000 m</text>
    <text x="35" y="225.0" transform="rotate(-90 35 225.0)" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#263238">Altitud: 7-11 m</text>
    
    <polyline points="120,390 120.00,390.00 288.00,245.00 552.00,100.00 744.00,172.50 1080.00,317.50 1080,390 120,390" fill="#dff1ed" stroke="#006d75" stroke-width="4" />
    <circle cx="120.00" cy="390.00" r="5" fill="#004f59" />
        <circle cx="288.00" cy="245.00" r="5" fill="#004f59" />
        <circle cx="552.00" cy="100.00" r="5" fill="#004f59" />
        <circle cx="744.00" cy="172.50" r="5" fill="#004f59" />
        <circle cx="1080.00" cy="317.50" r="5" fill="#004f59" />
    <g font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1f2933">
        <text x="128.00" y="375.00" text-anchor="start">Torre del Oro</text>
        <text x="288.00" y="210.00" text-anchor="middle">Palacio de San Telmo</text>
        <text x="552.00" y="85.00" text-anchor="middle">Glorieta de Bécquer</text>
        <text x="744.00" y="137.50" text-anchor="middle">Plaza de España</text>
        <text x="1072.00" y="302.50" text-anchor="end">Costurero de la Reina</text>
    </g>
</svg>
